<!DOCTYPE html>
<!-- DragZone DMG installer background. Rendered to bg@1x/bg@2x.png, then
     combined into bg.tiff (tiffutil) so Finder shows it crisp on retina:
       node ../../../../web/node_modules/.bin/... (see render note) OR headless
       Chrome --screenshot, then:
       tiffutil -cathidpicheck bg@1x.png bg@2x.png -out bg.tiff
     Icon slots (app at 165,195 / Applications at 495,195, 128px) stay clear —
     Finder draws them per appdmg.json. Light backdrop on purpose: Finder
     renders icon labels black over a custom background. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DragZone DMG background</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        width: 660px;
        height: 400px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(520px 320px at 84% -12%, rgba(124, 92, 255, 0.18), transparent 62%),
          radial-gradient(430px 300px at -6% 12%, rgba(76, 199, 247, 0.16), transparent 60%),
          radial-gradient(480px 360px at 50% 118%, rgba(59, 130, 246, 0.16), transparent 62%),
          #f3f6ff;
        color: #131a30;
      }
      .title {
        position: absolute;
        top: 34px;
        width: 100%;
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .arrow {
        position: absolute;
        top: 178px;
        left: 268px;
      }
      .caption {
        position: absolute;
        top: 330px;
        width: 100%;
        text-align: center;
        font-size: 14px;
        color: rgba(19, 26, 48, 0.7);
      }
    </style>
  </head>
  <body>
    <div class="title">DragZone</div>
    <svg class="arrow" width="124" height="34" viewBox="0 0 124 34" fill="none">
      <path d="M4 17 H104" stroke="rgba(19,26,48,0.4)" stroke-width="5" stroke-linecap="round" />
      <path
        d="M96 5 L114 17 L96 29"
        stroke="rgba(19,26,48,0.4)"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </svg>
    <div class="caption">Drag <b>DragZone</b> into the <b>Applications</b> folder to install</div>
  </body>
</html>
