name: Deploy Web

# Publishes apps/web to GitHub Pages at https://drag-zone.vozniak.dev (custom
# domain set in the repo's Pages config) on changes to the site or the shared
# package. The custom domain serves from the root, so no basePath is set;
# to serve under the github.io project path instead, set
# NEXT_PUBLIC_BASE_PATH=/drag-zone on the build step.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never run two at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Build static site
        run: cd apps/web && bun run build
      - uses: actions/configure-pages@v5
        with: { enablement: true }
      - uses: actions/upload-pages-artifact@v3
        with: { path: apps/web/out }

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
