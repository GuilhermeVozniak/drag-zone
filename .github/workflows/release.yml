name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.3.2 && git push origin v0.3.2
# Mirrors the proven option-tab release pipeline (same secret names and
# signing/notarization sequence); see docs/RELEASE.md for the secrets.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize
    # macos-latest, like option-tab: older images (macos-14) lack Apple's
    # Developer ID intermediate CA, leaving the imported identity "invalid".
    runs-on: macos-latest
    env:
      # secrets are not readable in step-level `if:`; surface presence here.
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build app (universal)
        run: wails build -platform darwin/universal -ldflags "-X main.appVersion=${{ steps.version.outputs.version }}"

      - name: Bundle universal dz CLI into Resources
        run: |
          CGO_ENABLED=0 GOARCH=arm64 go build -o "$RUNNER_TEMP/dz-arm64" ./cmd/dz
          CGO_ENABLED=0 GOARCH=amd64 go build -o "$RUNNER_TEMP/dz-amd64" ./cmd/dz
          lipo -create -output build/bin/dragzone.app/Contents/Resources/dz "$RUNNER_TEMP/dz-arm64" "$RUNNER_TEMP/dz-amd64"

      - name: Stamp bundle version
        run: |
          PLIST=build/bin/dragzone.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" "$PLIST"

      # Signing/notarization steps are skipped when the signing secrets are
      # absent (e.g. forks), so unsigned releases still build.
      - name: Import signing certificate
        if: env.HAS_MACOS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Keychain Access p12 exports hold only the leaf cert + key; import
          # Apple's Developer ID G2 intermediate too so the chain validates
          # regardless of what the runner image preinstalls.
          curl -sSLo "$RUNNER_TEMP/DeveloperIDG2CA.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm "$RUNNER_TEMP/cert.p12"
          # fail here, not at codesign, if the p12 lacks a Developer ID identity.
          security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application"

      - name: Sign app
        if: env.HAS_MACOS_SIGNING == 'true'
        run: |
          # dz is a Mach-O in Resources; --deep does not descend there, and
          # notarization rejects unsigned nested binaries, so sign it first.
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" build/bin/dragzone.app/Contents/Resources/dz
          codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application" build/bin/dragzone.app
          codesign --verify --deep --strict --verbose=2 build/bin/dragzone.app

      - name: Create DMG
        run: |
          npx --yes appdmg build/darwin/dmg/appdmg.json \
            "DragZone-${{ steps.version.outputs.version }}.dmg"

      - name: Sign, notarize, and staple dmg
        if: env.HAS_MACOS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG="DragZone-${{ steps.version.outputs.version }}.dmg"
          codesign --force --timestamp --sign "Developer ID Application" "$DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          # staple fails if notarization did not fully succeed, failing the job.
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DragZone-*.dmg
          generate_release_notes: true
