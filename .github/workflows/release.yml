name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.3.7 && git push origin v0.3.7
# Builds a signed + notarized universal DMG named per @dragzone/shared's
# contract (dragzone_<version>_darwin_universal.dmg). See docs/RELEASE.md.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize
    runs-on: macos-14
    env:
      # secrets are not readable in step-level `if:`; surface presence here.
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod
          cache-dependency-path: apps/desktop/go.sum

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build app (universal)
        working-directory: apps/desktop
        run: wails build -platform darwin/universal -ldflags "-X main.appVersion=${{ steps.version.outputs.version }}"

      - name: Bundle universal dz CLI into Resources
        working-directory: apps/desktop
        run: |
          CGO_ENABLED=0 GOARCH=arm64 go build -o "$RUNNER_TEMP/dz-arm64" ./cmd/dz
          CGO_ENABLED=0 GOARCH=amd64 go build -o "$RUNNER_TEMP/dz-amd64" ./cmd/dz
          lipo -create -output build/bin/dragzone.app/Contents/Resources/dz "$RUNNER_TEMP/dz-arm64" "$RUNNER_TEMP/dz-amd64"

      - name: Stamp bundle version
        run: |
          PLIST=apps/desktop/build/bin/dragzone.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" "$PLIST"

      # Signing/notarization steps are skipped when the signing secrets are
      # absent (e.g. forks), so unsigned releases still build.
      - name: Import signing certificate
        if: env.HAS_MACOS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Keychain Access p12 exports hold only the leaf cert + key; import
          # Apple's Developer ID G2 intermediate too so the chain validates.
          curl -sSLo "$RUNNER_TEMP/DeveloperIDG2CA.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"
          # Fail here (not at codesign) if the p12 isn't a Developer ID identity.
          security find-identity -v -p codesigning "$KEYCHAIN" | tail -1
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application"; then
            echo '::error::MACOS_CERT_P12 holds no valid "Developer ID Application" identity - re-export that exact row (not "Apple Development") from Keychain Access.'
            exit 1
          fi

      # Runs after the Developer ID identity is importable (so the .appex
      # can be signed with it directly) and before "Sign app" below, whose
      # `codesign --deep` over the whole bundle re-seals the embedded
      # extension along with everything else. Ad-hoc signs when no signing
      # secrets are configured (e.g. forks), matching the rest of this job.
      - name: Build + embed App Intents extension (Shortcuts integration)
        working-directory: apps/desktop
        run: |
          # appintentsmetadataprocessor (invoked by build-appintents.sh) is
          # pickier about the active toolchain than plain swiftc/lipo/codesign;
          # point xcode-select at the newest Xcode installed on the runner
          # image to give it the best chance of succeeding. Best-effort: if no
          # /Applications/Xcode_*.app exists (or the switch fails), fall back
          # to whatever is already selected. build-appintents.sh treats a
          # metadata-generation failure as non-fatal regardless.
          sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_*.app' 2>/dev/null | sort -V | tail -1 || echo /Applications/Xcode.app)" || true
          xcodebuild -version

          IDENTITY="-"
          if [ "$HAS_MACOS_SIGNING" = "true" ]; then
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/{print $2; exit}')
          fi
          bash build/build-appintents.sh "$IDENTITY"

      - name: Sign app
        if: env.HAS_MACOS_SIGNING == 'true'
        working-directory: apps/desktop
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          # Sign by the identity's hash with --keychain pinned (name-based
          # resolution reported "no identity found" on this runner).
          HASH=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/{print $2; exit}')
          test -n "$HASH"
          # dz is a Mach-O in Resources; --deep does not descend there, and
          # notarization rejects unsigned nested binaries, so sign it first.
          codesign --force --options runtime --timestamp --keychain "$KEYCHAIN" \
            --sign "$HASH" build/bin/dragzone.app/Contents/Resources/dz
          codesign --force --deep --options runtime --timestamp --keychain "$KEYCHAIN" \
            --sign "$HASH" build/bin/dragzone.app
          codesign --verify --deep --strict --verbose=2 build/bin/dragzone.app

      - name: Create DMG
        run: |
          npx --yes appdmg apps/desktop/build/darwin/dmg/appdmg.json \
            "dragzone_${{ steps.version.outputs.version }}_darwin_universal.dmg"

      - name: Sign, notarize, and staple dmg
        if: env.HAS_MACOS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          DMG="dragzone_${{ steps.version.outputs.version }}_darwin_universal.dmg"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          HASH=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/{print $2; exit}')
          test -n "$HASH"
          codesign --force --timestamp --keychain "$KEYCHAIN" --sign "$HASH" "$DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          # staple fails if notarization did not fully succeed, failing the job.
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dragzone_*.dmg
          generate_release_notes: true
