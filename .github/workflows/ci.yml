name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: Web + desktop frontend · lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - name: Desktop frontend tests (vitest)
        run: bun run --filter='@dragzone/desktop-frontend' test
      - run: bun run build
      - name: E2E (landing page)
        run: cd apps/web && bunx playwright install --with-deps chromium && bun run e2e

  desktop:
    name: Desktop · lint, build, test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod
          cache-dependency-path: apps/desktop/go.sum
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile

      - name: Check gofmt
        working-directory: apps/desktop
        run: |
          unformatted=$(gofmt -l . || true)
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi

      - name: Install Wails + golangci-lint
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # wails build regenerates frontend/wailsjs and frontend/dist (both
      # gitignored). The package-main //go:embed of frontend/dist needs dist
      # to exist before `go test`, so the build has to run first.
      - name: Build app (generates bindings + dist)
        working-directory: apps/desktop
        run: wails build

      - name: golangci-lint
        working-directory: apps/desktop
        run: golangci-lint run ./...

      - name: Go tests
        working-directory: apps/desktop
        run: go test ./...
