name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^frontend/' || true)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # wails build regenerates frontend/wailsjs and frontend/dist (both
      # gitignored). The package-main //go:embed of frontend/dist needs dist
      # to exist before `go test`, so the build has to run first.
      - name: Build app (generates bindings + dist)
        run: wails build

      - name: Go tests
        run: go test ./...

      - name: Frontend tests
        run: npm run test
        working-directory: frontend
