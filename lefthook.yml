# Git hooks for local quality gates (lefthook v2).
# Auto-installed by `bun install` (the package.json `prepare` script runs
# `lefthook install`), or run `bunx lefthook install` manually.
#
# pre-push runs the Go linter — install it once: `brew install golangci-lint`
# (or `go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest`).

pre-commit:
  parallel: true
  jobs:
    - name: gofmt
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: lint
      run: bun run lint
    - name: golangci-lint
      root: "apps/desktop/"
      run: |
        command -v golangci-lint >/dev/null 2>&1 || {
          echo "pre-push: golangci-lint not found — install it: brew install golangci-lint"
          exit 1
        }
        golangci-lint run ./internal/... ./cmd/...
    - name: go-test
      root: "apps/desktop/"
      run: go test ./internal/... ./cmd/...
    - name: frontend-test
      run: bun run --filter=@dragzone/desktop-frontend test
    - name: web-shared-test
      run: bun run test
